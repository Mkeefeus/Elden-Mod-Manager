name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name to use for the draft release (e.g. v0.3.0-test)"
        required: true
        default: "v0.0.0-test"

jobs:
  publish:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          if command -v sudo >/dev/null 2>&1; then
            APT_PREFIX="sudo"
          else
            APT_PREFIX=""
          fi

          $APT_PREFIX apt-get update
          $APT_PREFIX apt-get install -y rpm dpkg fakeroot

      - name: Stage bundled ME3 binary (Linux)
        if: runner.os == 'Linux'
        env:
          ME3_LINUX_URL: ${{ vars.ME3_LINUX_URL }}
        run: |
          set -euo pipefail
          if [ -z "${ME3_LINUX_URL:-}" ]; then
            echo "ME3_LINUX_URL repository variable is required"
            exit 1
          fi

          tmp_archive="$(mktemp --suffix=.tar.gz)"
          tmp_extract_dir="$(mktemp -d)"
          curl -fL "$ME3_LINUX_URL" -o "$tmp_archive"

          tar -xzf "$tmp_archive" -C "$tmp_extract_dir"

          bin_dir="$(find "$tmp_extract_dir" -type d -name bin | head -n 1)"
          if [ -z "$bin_dir" ]; then
            echo "Could not find bin directory in Linux ME3 archive"
            exit 1
          fi

          rm -rf resources/me3/linux
          mkdir -p resources/me3/linux
          cp -a "$bin_dir"/. resources/me3/linux/

          if [ -f resources/me3/linux/me3 ]; then
            chmod +x resources/me3/linux/me3
          fi

      - name: Stage bundled ME3 binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          ME3_WINDOWS_URL: ${{ vars.ME3_WINDOWS_URL }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:ME3_WINDOWS_URL)) {
            Write-Error "ME3_WINDOWS_URL repository variable is required"
          }

          $archivePath = Join-Path $env:RUNNER_TEMP "me3-windows-amd64.zip"
          $extractPath = Join-Path $env:RUNNER_TEMP "me3-windows"

          Invoke-WebRequest -Uri $env:ME3_WINDOWS_URL -OutFile $archivePath
          if (Test-Path $extractPath) {
            Remove-Item -Path $extractPath -Recurse -Force
          }
          Expand-Archive -Path $archivePath -DestinationPath $extractPath

          $binDir = Get-ChildItem -Path $extractPath -Directory -Recurse | Where-Object { $_.Name -eq "bin" } | Select-Object -First 1
          if (-not $binDir) {
            Write-Error "Could not find bin directory in Windows ME3 archive"
          }

          if (Test-Path "resources/me3/win32") {
            Remove-Item -Path "resources/me3/win32" -Recurse -Force
          }
          New-Item -ItemType Directory -Path "resources/me3/win32" -Force | Out-Null
          Copy-Item -Path (Join-Path $binDir.FullName "*") -Destination "resources/me3/win32" -Recurse -Force

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Publish
        run: pnpm run publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
