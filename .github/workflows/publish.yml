name: Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name to use for the draft release (e.g. v0.3.0-test)'
        required: true
        default: 'v0.0.0-test'

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release-id: ${{ steps.create.outputs.result }}

    steps:
      - name: Create draft release
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.eventName === 'workflow_dispatch'
              ? context.payload.inputs.tag
              : context.ref.replace('refs/tags/', '');
            const { data: release } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: tag,
              draft: true,
              generate_release_notes: true,
            });
            return release.id;

  publish:
    needs: create-release
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y rpm

      - name: Install Node dependencies
        run: npm ci

      - name: Publish
        run: npm run publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
